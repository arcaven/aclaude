[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "0BSD",
    "BSL-1.0",
]

[[licenses.exceptions]]
allow = ["CDLA-Permissive-2.0"]
name = "webpki-roots"

[bans]
multiple-versions = "warn"
wildcards = "allow"

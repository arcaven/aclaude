id: decision-language-rust
type: element
confidence: bedrock
title: "forestage is written in Rust"
content: |
  Rust chosen over TypeScript (inherited from pennyfarthing) following the
  axios npm supply chain incident of 2026-03-31. Decision driven by:

  1. Supply chain safety: cargo-deny auditing, no npm/node ecosystem.
     The npm ecosystem is a structural liability for a tool that produces
     signed, distributed binaries (CI → GitHub releases → Homebrew tap).

  2. Portability: single static binary, no runtime dependencies.

  3. Performance: native binary startup eliminates bun VM overhead
     (previously ~15s first-prompt latency). Smaller binary (bun compile
     produced 63MB).

  4. Ecosystem alignment: marvel and switchboard are Go, kos is Rust.
     The platform's compiled-language ecosystem is coherent.

  5. No SDK dependency: forestage spawns `claude` CLI as a subprocess
     using the NDJSON streaming protocol. The subprocess protocol is
     the stable contract — no @anthropic-ai/claude-agent-sdk needed.

  Trade-offs accepted:
  - Higher development cost than TypeScript for UI/string work
  - No Agent SDK (spawns claude CLI directly — this is a feature, not
    a limitation: tighter coupling to the stable CLI interface)
  - Build.rs theme embedding replaces embed-themes.ts

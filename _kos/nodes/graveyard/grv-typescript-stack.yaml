title: "TypeScript + bun compile + Agent SDK stack"
content: |
  forestage's original implementation stack, inherited from pennyfarthing.
  TypeScript compiled via bun compile, using @anthropic-ai/claude-agent-sdk
  and @anthropic-ai/sdk for Claude Code integration.

  Worked: bun compile produced signed binaries, themes embedded, Agent SDK
  provided subprocess management, distribution pipeline validated (38 findings
  in aae-orc sprint/rd/forestage-distribution.md).

  Problems that accumulated:
  - 15-second first-prompt latency (bun VM startup)
  - 63MB binary size
  - bun compile virtual FS broke 5+ features (import.meta.url, embedded
    asset introspection, theme path resolution)
  - npm supply chain exposure (axios incident, 2026-03-31)
  - Agent SDK coupled to Node.js ecosystem
graveyard:
  approach: "TypeScript + bun compile + @anthropic-ai/claude-agent-sdk"
  ruling: "npm supply chain risk was the forcing function. Performance and binary size were compounding factors."
  reopener: "None. Rust rewrite is merged and working."

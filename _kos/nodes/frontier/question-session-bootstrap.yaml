id: question-session-bootstrap
type: question
confidence: frontier
title: "How should aclaude sessions be bootstrapped?"
content: |
  Docker-like layering model: entrypoint (baked — "you are aclaude"),
  installed base (packs, themes, commands — updateable), session injection
  (persona, model, permissions — ephemeral).

  Post-rewrite: aclaude spawns `claude` CLI as a subprocess with
  --append-system-prompt for persona injection. No Agent SDK —
  the NDJSON subprocess protocol is the integration point. Session
  modes: interactive (TUI passthrough), one-shot (-p prompt), and
  streaming agent (NDJSON).

  Open tension: Claude Code config inheritance. Users may want
  full inheritance (additive), isolation, or switching between
  vanilla Claude Code and aclaude. This should be configurable
  per-session, possibly per-workspace in marvel.

  For autonomous agents (marvel teams): different bootstrap. No TUI
  instructions, no persona flair. Task assignment, tool permissions,
  workspace boundaries. Same binary, different CLI flags.

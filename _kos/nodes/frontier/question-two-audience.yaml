id: question-two-audience
type: question
confidence: frontier
title: "Two-audience problem — human operators vs autonomous agents"
content: |
  aclaude serves human operators (TUI, status bars, persona flair, markdown
  rendering) and autonomous agents under marvel (fast startup, minimal
  overhead, programmatic control, no visual decoration). These may not be
  the same binary or the same runtime mode.

  The Rust rewrite resolved the language question but not the audience
  question. Rust gives both audiences a fast, portable binary. The question
  is now about runtime behavior, not implementation stack:

  - Should aclaude have a --headless or --agent flag that strips TUI,
    persona flair, and interactive prompts?
  - Should marvel's team manifests specify a runtime mode per role?
  - Is this one binary with feature flags, or genuinely two binaries?

  The subprocess protocol (NDJSON) is the same for both audiences. The
  differentiation is in what wraps it: TUI + persona for humans, minimal
  passthrough for agents.

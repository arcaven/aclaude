id: question-two-audience
type: question
confidence: frontier
title: "Two-audience problem — human operators vs autonomous agents"
content: |
  aclaude serves human operators (TUI, status bars, persona flair, markdown
  rendering) and autonomous agents under marvel (fast startup, minimal
  overhead, programmatic control, no visual decoration). These may not be
  the same binary, language, or SDK. Optimizing for both risks the least
  common denominator of features with the sum of the compromises.

  The bundled-themes finding (agent can't introspect embedded data) is a
  symptom — the subprocess boundary creates opacity that hurts the agent
  use case while the persona system adds value for the human use case.

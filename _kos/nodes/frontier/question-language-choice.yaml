id: question-language-choice
type: question
confidence: frontier
title: "Should aclaude be TypeScript?"
content: |
  TypeScript inherited from pennyfarthing, not chosen against examined
  requirements. It works: bun compile produces signed binaries, themes
  embed, Agent SDK is Node.js-native. But: 15s first-prompt latency,
  no TUI without additional frameworks, bun compile virtual FS friction
  (5+ features broken), 63MB binary.

  Alternatives not yet evaluated: Go (matches marvel/switchboard, fast
  startup, bubbletea TUI), Rust (small binary, performance), Python
  (Agent SDK exists, packaging worse).

  Not proposing a rewrite. Proposing this question be examined rather
  than assumed settled. The distribution probe validated bun compile
  works — it did not validate TypeScript is the right choice.

id: question-theme-bundling
type: question
confidence: frontier
title: "Should themes/personas be bundled or loaded at runtime?"
content: |
  Currently 118 theme YAMLs embedded in binary via build.rs compile-time
  code generation. Portraits already external (global cache). The agent
  subprocess (Claude Code) cannot introspect embedded themes.

  The Rust rewrite changed the mechanism (build.rs instead of
  embed-themes.ts) but not the question. Themes are still compiled into
  the binary. The trade-offs remain:

  Runtime loading: pack system (marvel), smaller binary, multi-console reuse.
  Bundling: zero-dependency, offline, version coherence.
  Hybrid: bundle minimal default, load additional from ~/.local/share/aclaude/
  or via marvel pack resolution.

  New consideration post-rewrite: Rust's include_str!/include_bytes! and
  build.rs code generation make embedding cheap and reliable (no virtual FS
  friction like bun compile). This makes bundling more attractive than it
  was in TypeScript.

id: question-version-coordination
type: question
confidence: frontier
title: "How should brew and self-update coordinate?"
content: |
  Brew and self-update are parallel version managers with no coordination.
  build.rs generate_version() injects VERSION, CHANNEL, COMMIT, BUILD_TIME
  at compile time via cargo rustc-env directives.

  Post-rewrite: the version injection mechanism changed (gen-version.ts →
  build.rs) but the coordination question is unchanged. Self-update
  (updater.rs) and Homebrew tap are both distribution channels that need
  to coexist or have one defer to the other.

  Open: should aclaude detect brew install and defer to brew upgrade?
  Or should one channel win? Dual-track (alpha via self-update, stable
  via brew) is the design but needs re-validation for Rust artifacts
  (cargo build instead of bun compile).

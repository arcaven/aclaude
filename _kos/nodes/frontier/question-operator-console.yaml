id: question-operator-console
type: question
confidence: frontier
title: "forestage as operator console over headless Claude Code"
content: |
  Claude Code CLI runs headless as a data source. forestage owns the entire
  UI surface — layout, images, metrics dashboards, context window gauges,
  health indicators. The NDJSON stream is a telemetry feed: token usage,
  tool calls, reasoning, errors as structured events. forestage parses,
  aggregates, and renders however it wants.

  This is stronger than either the SDK or the interactive TUI gave us:
  - SDK limited us to its callback model and Node.js ecosystem
  - Wrapping the TUI meant fighting someone else's layout
  - Headless + own rendering means full control over the visual surface

  Enables: custom operator console with visual identity for the
  Director/Supervisor/Crew hierarchy. Marvel session health, context
  budget burn rate, tool call frequency, session cost — all rendered
  by forestage, not Claude Code.

  Cleanly resolves the two-audience problem (question-two-audience):
  headless mode for agents under marvel is the same binary with no
  rendering. Agents get the data pipe. Humans get the operator console.
  Same NDJSON parsing, different output.

  Reframes F14 (TUI) from "replicate Claude Code's TUI" to "build an
  operator console that uses Claude Code as a headless engine."

  Questions:
  - What events does the NDJSON stream expose? Is it sufficient for
    per-turn token counting, tool call tracking, cost estimation?
  - What's missing from the stream that the SDK provided (hooks,
    structured tool events, session lifecycle)?
  - Can we get OAuth inheritance when spawning claude headless?
  - What Rust TUI framework fits? ratatui is the obvious choice.
  - How does this interact with marvel's observability (OTEL)?
    Is forestage the local renderer of the same telemetry marvel
    collects cluster-wide?

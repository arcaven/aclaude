id: finding-001-rust-rewrite
type: finding
title: "Rust rewrite resolves language choice, supply chain, and binary portability"
probe: null  # reactive decision, not a planned probe
content: |
  On 2026-03-31, the axios npm supply chain attack (malicious RAT dropper in
  axios@1.14.1, live ~3 hours) exposed the structural risk of aclaude's npm
  dependency chain. aclaude was not compromised (axios not in resolved tree,
  no CI runs during window), but the incident crystallized two latent concerns:

  1. The npm ecosystem is a supply chain liability for a tool that produces
     signed, distributed binaries. A compromised build-time dependency would
     amplify through CI → GitHub releases → Homebrew tap → end users.

  2. The TypeScript/bun-compile approach was inherited from pennyfarthing,
     not chosen against requirements (question-language-choice). The Rust
     rewrite was already a plausible path; the supply chain incident provided
     the forcing function.

  ## What changed

  - Language: TypeScript → Rust (Edition 2024, MSRV 1.85+)
  - Build: bun compile → cargo build (static binary)
  - SDK: @anthropic-ai/claude-agent-sdk removed. aclaude now spawns `claude`
    CLI as a subprocess using the NDJSON streaming protocol directly. No SDK
    dependency — the subprocess protocol is the stable contract.
  - Theme embedding: embed-themes.ts → build.rs (compile-time code generation)
  - Config: TOML config with 5-layer merge (defaults → global → local → env → CLI)
  - Error handling: thiserror + anyhow, no unwrap() in production code
  - Supply chain: cargo-deny for dependency auditing, no npm/node ecosystem

  ## What this resolves

  - question-language-choice: RESOLVED. Rust chosen for portability, supply
    chain safety, binary size, startup speed, and ecosystem alignment with
    marvel/switchboard (Go) and kos (Rust).
  - Charter B1 (Dual SDK Design): SUPERSEDED. No SDK dependency. Direct
    subprocess spawning via NDJSON protocol.
  - Charter B3 (Distribution Model): PARTIALLY SUPERSEDED. Bun compile
    findings no longer apply. Cargo build produces native binaries. Homebrew
    tap, self-update, dual channels still applicable in principle but need
    re-validation for Rust artifacts.
  - 15-second first-prompt latency: LIKELY RESOLVED. Native binary startup
    eliminates bun VM initialization overhead. Not yet benchmarked.
  - 63MB binary size: LIKELY RESOLVED. Rust binaries are typically 5-15MB
    with embedded assets. Not yet measured.

  ## What remains open

  - question-two-audience: Still open. Language changed but the fundamental
    tension (human TUI vs agent headless) persists.
  - question-theme-bundling: Still open. Mechanism changed (build.rs instead
    of embed-themes.ts) but the question of bundle vs runtime load remains.
  - question-session-bootstrap: Still open. Implementation details changed
    but the layering model question persists.
  - question-version-coordination: Still open. gen-version.ts → build.rs
    generate_version(), but brew/self-update coordination unresolved.

  ## Assumption provenance note (F16)

  The distribution probe findings (aae-orc sprint/rd/aclaude-distribution.md,
  38 findings) were implementation-bound to TypeScript/bun. Most are now
  stale. Portable findings that survive: brew tap pipeline pattern, dual
  alpha/stable channel model, self-update UX pattern, code signing workflow.
  Implementation-specific findings (bun compile virtual FS, import.meta.url,
  embedded asset introspection) are graveyard material.

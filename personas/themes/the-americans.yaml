    ocean:
      O: 3  # FBI method
      C: 5  # Agent discipline
      E: 3  # Professional presence
      A: 3  # Complex loyalty
      N: 3  # Suspicion burden
    style: FBI agent who tests everyone's loyalty, including his friends

      style: Smuggler ship, now Count's yacht
  ba:
    character: The Count of Monte Cristo (Analyst)
    visual: "An aristocratic man with pale intense face, wearing elaborate Count's attire, mysterious knowing half-smile, analytical gaze that sees through all deception"
    shortName: Analyst
    ocean:
      O: 5  # Vast knowledge across all domains
      C: 5  # Fourteen years of patient analysis
      E: 3  # Reserved observation
      A: 2  # Truth over comfort
      N: 2  # Cold analytical precision

# CI + Alpha Release
# Triggers: push to main, pull requests
# Builds binaries for all platforms, signs/notarizes, creates pre-release, updates homebrew-tap
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CREDITS.md'
      - '.gitignore'
      - 'sources.toml'
      - '_kos/**'
      - '.github/workflows/release.yml'
      - '.github/workflows/release-verify.yml'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  check-fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
          components: rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true
      - run: cargo +nightly fmt --all -- --check

  check-clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true
      - run: cargo test --all-targets

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: EmbarkStudios/cargo-deny-action@82eb9f621fbc699dd0918f3ea06864c14cc84246 # v2
        with:
          command: check advisories licenses bans

  build:
    name: Build (${{ matrix.target }})
    needs: [check-fmt, check-clippy, test, deny]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: aclaude-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: aclaude-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact_name: aclaude-linux-arm64
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="alpha-$(date -u +%Y%m%d-%H%M%S)-$(echo ${{ github.sha }} | head -c 7)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build stable binary
        env:
          ACLAUDE_CHANNEL: stable
          ACLAUDE_TAG: ${{ steps.version.outputs.version }}
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/aclaude ${{ matrix.artifact_name }}

      - name: Build alpha binary
        env:
          ACLAUDE_CHANNEL: alpha
          ACLAUDE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          cargo clean --release --target ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/aclaude ${{ matrix.artifact_name }}-alpha
          # Rename to aclaude-a convention
          mv ${{ matrix.artifact_name }}-alpha $(echo "${{ matrix.artifact_name }}" | sed 's/aclaude/aclaude-a/')

      - name: Verify binaries
        run: |
          echo "Stable:"
          ./${{ matrix.artifact_name }} --version
          echo "Alpha:"
          ./$(echo "${{ matrix.artifact_name }}" | sed 's/aclaude/aclaude-a/') --version

      - name: Upload artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: binaries-${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            aclaude-a-*

  sign-and-notarize:
    name: Sign & Notarize
    needs: build
    if: vars.SIGNING_ENABLED == 'true'
    permissions:
      contents: write
    environment: release
    strategy:
      matrix:
        arch: [arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download binaries
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: binaries-aclaude-darwin-${{ matrix.arch }}

      - name: Import certificates
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm cert.p12

          echo "$APPLE_INSTALLER_CERTIFICATE_P12" | base64 --decode > installer-cert.p12
          security import installer-cert.p12 -k build.keychain -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/pkgbuild -T /usr/bin/productbuild -T /usr/bin/productsign
          rm installer-cert.p12

          curl -sfo /tmp/DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security add-certificates -k build.keychain /tmp/DeveloperIDG2CA.cer
          rm /tmp/DeveloperIDG2CA.cer

          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign binaries
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for binary in aclaude-darwin-${{ matrix.arch }} aclaude-a-darwin-${{ matrix.arch }}; do
            codesign --force --options runtime \
              --sign "$APPLE_SIGNING_IDENTITY" \
              --timestamp \
              "$binary"
          done

      - name: Verify signatures
        run: |
          codesign --verify --deep --strict aclaude-darwin-${{ matrix.arch }}
          codesign --verify --deep --strict aclaude-a-darwin-${{ matrix.arch }}

      - name: Build app bundles
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          chmod +x scripts/create-app.sh
          ./scripts/create-app.sh aclaude-darwin-${{ matrix.arch }} "$VERSION" .
          mv Aclaude.app Aclaude-${{ matrix.arch }}.app

      - name: Sign app bundles
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            Aclaude-${{ matrix.arch }}.app

      - name: Build dmg images
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          chmod +x scripts/create-dmg.sh
          ./scripts/create-dmg.sh Aclaude-${{ matrix.arch }}.app "$VERSION" aclaude-${{ matrix.arch }}.dmg

      - name: Build pkg installers
        env:
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: |
          if ! security find-identity -v build.keychain | grep -q "$APPLE_INSTALLER_IDENTITY"; then
            echo "::error::APPLE_INSTALLER_IDENTITY not found in keychain"
            security find-identity -v build.keychain
            exit 1
          fi
          VERSION="${{ needs.build.outputs.version }}"
          chmod +x scripts/create-pkg.sh
          ./scripts/create-pkg.sh aclaude-darwin-${{ matrix.arch }} "$VERSION" "$APPLE_INSTALLER_IDENTITY" aclaude-${{ matrix.arch }}.pkg

      - name: Notarize and staple all artifacts
        env:
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_NOTARIZATION_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
        run: |
          for ARTIFACT in aclaude-${{ matrix.arch }}.pkg aclaude-${{ matrix.arch }}.dmg; do
            echo "Notarizing $ARTIFACT..."
            xcrun notarytool submit "$ARTIFACT" \
              --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
              --password "$APPLE_NOTARIZATION_PASSWORD" \
              --team-id "$APPLE_NOTARIZATION_TEAM_ID" \
              --wait --timeout 14400
            xcrun stapler staple "$ARTIFACT"
          done

      - name: Upload signed artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: signed-binaries-darwin-${{ matrix.arch }}
          path: |
            aclaude-darwin-${{ matrix.arch }}
            aclaude-a-darwin-${{ matrix.arch }}
            aclaude-${{ matrix.arch }}.pkg
            aclaude-${{ matrix.arch }}.dmg
          retention-days: 14

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true

  alpha-release:
    name: Create Alpha Release
    needs: [build, sign-and-notarize]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.sign-and-notarize.result == 'success' || needs.sign-and-notarize.result == 'skipped')
    permissions:
      contents: write
    environment: release
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS arm64
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: ${{ needs.sign-and-notarize.result == 'success' && 'signed-binaries-darwin-arm64' || 'binaries-aclaude-darwin-arm64' }}
          path: dist/

      - name: Download Linux amd64
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: binaries-aclaude-linux-amd64
          path: dist/

      - name: Download Linux arm64
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: binaries-aclaude-linux-arm64
          path: dist/

      - name: List release files
        run: ls -la dist/

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --prerelease \
            --title "Alpha: $TAG" \
            --notes "$(cat <<NOTES
          Automated alpha release from merge to main.

          **Version:** ${{ needs.build.outputs.version }}
          **Commit:** ${{ github.sha }}
          **Built with:** Rust (cargo)
          **Signed:** ${{ needs.sign-and-notarize.result == 'success' && 'Yes (Apple Developer ID)' || 'No (unsigned)' }}

          **Binaries:**
          - \`aclaude-darwin-arm64\` — macOS Apple Silicon
          - \`aclaude-a-darwin-arm64\` — macOS Apple Silicon (alpha)
          - \`aclaude-linux-amd64\` — Linux x86_64
          - \`aclaude-linux-arm64\` — Linux ARM64
          NOTES
          )" \
            dist/*

      - name: Clean old alpha releases (keep 30)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo "${{ github.repository }}" \
            --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease)] | sort_by(.tagName) | reverse | .[30:] | .[].tagName' \
          | while read -r tag; do
              echo "Deleting old alpha release: $tag"
              gh release delete "$tag" --repo "${{ github.repository }}" --yes --cleanup-tag
            done

  update-homebrew:
    name: Update Homebrew Tap (Alpha)
    needs: [build, sign-and-notarize, alpha-release]
    if: needs.alpha-release.result == 'success' && needs.sign-and-notarize.result == 'success'
    permissions:
      contents: write
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download signed darwin binaries
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: signed-binaries-darwin-arm64
          path: dist/

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          VERSION="${{ needs.build.outputs.version }}"

          SHA256_ARM64=$(shasum -a 256 dist/aclaude-a-darwin-arm64 | cut -d' ' -f1)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/arcavenae/homebrew-tap.git" homebrew-tap-repo
          cd homebrew-tap-repo

          mkdir -p Formula
          cp ../Formula/aclaude-a.rb Formula/aclaude-a.rb

          sed -i "s/VERSION_PLACEHOLDER/$TAG/g" Formula/aclaude-a.rb
          sed -i "s/TAG_PLACEHOLDER/$TAG/g" Formula/aclaude-a.rb
          sed -i "s/SHA256_ARM64_PLACEHOLDER/$SHA256_ARM64/g" Formula/aclaude-a.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aclaude-a.rb
          git diff --cached --quiet || git commit -m "Update aclaude-a to $TAG"
          git push

# CI + Alpha Release
# Triggers: push to main, pull requests
# Builds binaries for all platforms, signs/notarizes, creates pre-release, updates homebrew-tap
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'CREDITS.md'
      - '.gitignore'
      - 'sources.toml'
      - '.github/workflows/release.yml'
      - '.github/workflows/release-verify.yml'
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  BUN_VERSION: "1.3"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: cd cli && bun install
      - name: Generate version file
        run: bun run cli/scripts/gen-version.ts
      - run: cd cli && bun run lint
      - run: cd cli && bun run test

  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-latest
          # darwin-amd64 skipped: macOS Intel runners deprecated,
          # arm64 binaries run on Intel via Rosetta 2
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: cd cli && bun install

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./cli/package.json').version")
          TAG="alpha-$(date -u +%Y%m%d-%H%M%S)-$(echo ${{ github.sha }} | head -c 7)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Embed themes
        run: bun run cli/scripts/embed-themes.ts

      - name: Build stable binary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          bun run cli/scripts/gen-version.ts --channel stable
          cd cli
          bun build --compile src/index.ts --outfile aclaude-${{ matrix.os }}-${{ matrix.arch }}

      - name: Build alpha binary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          bun run cli/scripts/gen-version.ts --channel alpha --tag "$TAG"
          cd cli
          bun build --compile src/index.ts --outfile aclaude-a-${{ matrix.os }}-${{ matrix.arch }}

      - name: Verify binaries
        run: |
          cd cli
          echo "Stable:"
          ./aclaude-${{ matrix.os }}-${{ matrix.arch }} --version
          echo "Alpha:"
          ./aclaude-a-${{ matrix.os }}-${{ matrix.arch }} --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            cli/aclaude-${{ matrix.os }}-${{ matrix.arch }}
            cli/aclaude-a-${{ matrix.os }}-${{ matrix.arch }}

  sign-and-notarize:
    name: Sign & Notarize
    needs: build
    if: vars.SIGNING_ENABLED == 'true'
    environment: release
    strategy:
      matrix:
        arch: [arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-darwin-${{ matrix.arch }}

      - name: Import certificates
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          # Import application certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm cert.p12

          # Import installer certificate (for pkg signing)
          echo "$APPLE_INSTALLER_CERTIFICATE_P12" | base64 --decode > installer-cert.p12
          security import installer-cert.p12 -k build.keychain -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/pkgbuild -T /usr/bin/productbuild -T /usr/bin/productsign
          rm installer-cert.p12

          # Install Apple Developer ID G2 intermediate certificate
          curl -sfo /tmp/DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security add-certificates -k build.keychain /tmp/DeveloperIDG2CA.cer
          rm /tmp/DeveloperIDG2CA.cer

          # Allow Apple tools to access keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Verify certificate import
        run: |
          echo "Listing signing identities:"
          security find-identity -v build.keychain
          echo ""
          echo "Checking for installer identity:"
          security find-identity -v build.keychain | grep -i "installer" || echo "WARNING: No installer identity found in keychain"

      - name: Sign binaries
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for binary in aclaude-darwin-${{ matrix.arch }} aclaude-a-darwin-${{ matrix.arch }}; do
            codesign --force --options runtime \
              --sign "$APPLE_SIGNING_IDENTITY" \
              --timestamp \
              "$binary"
          done

      - name: Verify signatures
        run: |
          codesign --verify --deep --strict aclaude-darwin-${{ matrix.arch }}
          codesign --verify --deep --strict aclaude-a-darwin-${{ matrix.arch }}

      - name: Build app bundles
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          chmod +x scripts/create-app.sh

          ./scripts/create-app.sh aclaude-darwin-${{ matrix.arch }} "$VERSION" .
          mv Aclaude.app Aclaude-${{ matrix.arch }}.app

      - name: Sign app bundles
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            Aclaude-${{ matrix.arch }}.app

      - name: Build dmg images
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          chmod +x scripts/create-dmg.sh
          ./scripts/create-dmg.sh Aclaude-${{ matrix.arch }}.app "$VERSION" aclaude-${{ matrix.arch }}.dmg

      - name: Build pkg installers
        env:
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: |
          if ! security find-identity -v build.keychain | grep -q "$APPLE_INSTALLER_IDENTITY"; then
            echo "::error::APPLE_INSTALLER_IDENTITY not found in keychain"
            security find-identity -v build.keychain
            exit 1
          fi

          VERSION="${{ needs.build.outputs.version }}"
          chmod +x scripts/create-pkg.sh
          ./scripts/create-pkg.sh aclaude-darwin-${{ matrix.arch }} "$VERSION" "$APPLE_INSTALLER_IDENTITY" aclaude-${{ matrix.arch }}.pkg

      - name: Notarize and staple all artifacts
        env:
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_NOTARIZATION_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
        run: |
          for ARTIFACT in aclaude-${{ matrix.arch }}.pkg aclaude-${{ matrix.arch }}.dmg; do
            echo "Notarizing $ARTIFACT..."
            xcrun notarytool submit "$ARTIFACT" \
              --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
              --password "$APPLE_NOTARIZATION_PASSWORD" \
              --team-id "$APPLE_NOTARIZATION_TEAM_ID" \
              --wait --timeout 14400
            xcrun stapler staple "$ARTIFACT"
          done

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-binaries-darwin-${{ matrix.arch }}
          path: |
            aclaude-darwin-${{ matrix.arch }}
            aclaude-a-darwin-${{ matrix.arch }}
            aclaude-${{ matrix.arch }}.pkg
            aclaude-${{ matrix.arch }}.dmg
          retention-days: 14

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true

  alpha-release:
    name: Create Alpha Release
    needs: [build, sign-and-notarize]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.sign-and-notarize.result == 'success' || needs.sign-and-notarize.result == 'skipped')
    environment: release
    runs-on: ubuntu-latest
    steps:
      # Download signed macOS binaries if available, otherwise unsigned
      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.sign-and-notarize.result == 'success' && 'signed-binaries-darwin-arm64' || 'binaries-darwin-arm64' }}
          path: dist/

      - name: Download Linux amd64
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: dist/

      - name: Download Linux arm64
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-arm64
          path: dist/

      - name: List release files
        run: ls -la dist/

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --prerelease \
            --title "Alpha: $TAG" \
            --notes "$(cat <<NOTES
          Automated alpha release from merge to main.

          **Version:** ${{ needs.build.outputs.version }}
          **Commit:** ${{ github.sha }}
          **Signed:** ${{ needs.sign-and-notarize.result == 'success' && 'Yes (Apple Developer ID)' || 'No (unsigned)' }}

          **Binaries:**
          - \`aclaude-darwin-arm64\` — macOS Apple Silicon
          - \`aclaude-a-darwin-arm64\` — macOS Apple Silicon (alpha)
          - \`aclaude-linux-amd64\` — Linux x86_64
          - \`aclaude-linux-arm64\` — Linux ARM64
          NOTES
          )" \
            dist/*

      - name: Clean old alpha releases (keep 30)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo "${{ github.repository }}" \
            --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease)] | sort_by(.tagName) | reverse | .[30:] | .[].tagName' \
          | while read -r tag; do
              echo "Deleting old alpha release: $tag"
              gh release delete "$tag" --repo "${{ github.repository }}" --yes --cleanup-tag
            done

  update-homebrew:
    name: Update Homebrew Tap (Alpha)
    needs: [build, sign-and-notarize, alpha-release]
    if: needs.alpha-release.result == 'success' && needs.sign-and-notarize.result == 'success'
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download signed darwin binaries
        uses: actions/download-artifact@v4
        with:
          name: signed-binaries-darwin-arm64
          path: dist/

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          VERSION="${{ needs.build.outputs.version }}"

          SHA256_ARM64=$(shasum -a 256 dist/aclaude-a-darwin-arm64 | cut -d' ' -f1)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/arcaven/homebrew-tap.git" homebrew-tap-repo
          cd homebrew-tap-repo

          mkdir -p Formula
          cp ../Formula/aclaude-a.rb Formula/aclaude-a.rb

          sed -i "s/VERSION_PLACEHOLDER/$TAG/g" Formula/aclaude-a.rb
          sed -i "s/TAG_PLACEHOLDER/$TAG/g" Formula/aclaude-a.rb
          sed -i "s/SHA256_ARM64_PLACEHOLDER/$SHA256_ARM64/g" Formula/aclaude-a.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aclaude-a.rb
          git diff --cached --quiet || git commit -m "Update aclaude-a to $TAG"
          git push

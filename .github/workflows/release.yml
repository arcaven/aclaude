# Stable Release
# Triggers: tag push matching v*
# Builds binaries, signs/notarizes, creates GitHub release, updates homebrew-tap
name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets

  build:
    name: Build (${{ matrix.target }})
    needs: check
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: aclaude-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: aclaude-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact_name: aclaude-linux-arm64
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          ACLAUDE_CHANNEL: stable
          ACLAUDE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/aclaude ${{ matrix.artifact_name }}

      - name: Verify binary
        run: ./${{ matrix.artifact_name }} --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  sign-and-notarize:
    name: Sign & Notarize
    needs: build
    if: vars.SIGNING_ENABLED == 'true'
    environment: release
    strategy:
      matrix:
        arch: [arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-aclaude-darwin-${{ matrix.arch }}

      - name: Import certificates
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm cert.p12

          echo "$APPLE_INSTALLER_CERTIFICATE_P12" | base64 --decode > installer-cert.p12
          security import installer-cert.p12 -k build.keychain -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/pkgbuild -T /usr/bin/productbuild -T /usr/bin/productsign
          rm installer-cert.p12

          curl -sfo /tmp/DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security add-certificates -k build.keychain /tmp/DeveloperIDG2CA.cer
          rm /tmp/DeveloperIDG2CA.cer

          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            aclaude-darwin-${{ matrix.arch }}

      - name: Verify signature
        run: codesign --verify --deep --strict aclaude-darwin-${{ matrix.arch }}

      - name: Build app bundle
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          chmod +x scripts/create-app.sh
          ./scripts/create-app.sh aclaude-darwin-${{ matrix.arch }} "$VERSION" .
          mv Aclaude.app Aclaude-${{ matrix.arch }}.app

      - name: Sign app bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            Aclaude-${{ matrix.arch }}.app

      - name: Build dmg
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          chmod +x scripts/create-dmg.sh
          ./scripts/create-dmg.sh Aclaude-${{ matrix.arch }}.app "$VERSION" aclaude-${{ matrix.arch }}.dmg

      - name: Build pkg
        env:
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: |
          if ! security find-identity -v build.keychain | grep -q "$APPLE_INSTALLER_IDENTITY"; then
            echo "::error::APPLE_INSTALLER_IDENTITY not found in keychain"
            security find-identity -v build.keychain
            exit 1
          fi
          VERSION="${{ needs.build.outputs.version }}"
          chmod +x scripts/create-pkg.sh
          ./scripts/create-pkg.sh aclaude-darwin-${{ matrix.arch }} "$VERSION" "$APPLE_INSTALLER_IDENTITY" aclaude-${{ matrix.arch }}.pkg

      - name: Notarize and staple
        env:
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_NOTARIZATION_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
        run: |
          for ARTIFACT in aclaude-${{ matrix.arch }}.pkg aclaude-${{ matrix.arch }}.dmg; do
            echo "Notarizing $ARTIFACT..."
            xcrun notarytool submit "$ARTIFACT" \
              --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
              --password "$APPLE_NOTARIZATION_PASSWORD" \
              --team-id "$APPLE_NOTARIZATION_TEAM_ID" \
              --wait --timeout 14400
            xcrun stapler staple "$ARTIFACT"
          done

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-binaries-darwin-${{ matrix.arch }}
          path: |
            aclaude-darwin-${{ matrix.arch }}
            aclaude-${{ matrix.arch }}.pkg
            aclaude-${{ matrix.arch }}.dmg
          retention-days: 14

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true

  release:
    name: Create Release
    needs: [build, sign-and-notarize]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.sign-and-notarize.result == 'success' || needs.sign-and-notarize.result == 'skipped')
    environment: release
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.sign-and-notarize.result == 'success' && 'signed-binaries-darwin-arm64' || 'binaries-aclaude-darwin-arm64' }}
          path: dist/

      - name: Download Linux amd64
        uses: actions/download-artifact@v4
        with:
          name: binaries-aclaude-linux-amd64
          path: dist/

      - name: Download Linux arm64
        uses: actions/download-artifact@v4
        with:
          name: binaries-aclaude-linux-arm64
          path: dist/

      - name: List release files
        run: ls -la dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="${{ needs.build.outputs.tag }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --generate-notes \
            dist/*

  update-homebrew:
    name: Update Homebrew Tap
    needs: [build, sign-and-notarize, release]
    if: needs.release.result == 'success' && needs.sign-and-notarize.result == 'success'
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download signed darwin binaries
        uses: actions/download-artifact@v4
        with:
          name: signed-binaries-darwin-arm64
          path: dist/

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="${{ needs.build.outputs.tag }}"

          SHA256_ARM64=$(shasum -a 256 dist/aclaude-darwin-arm64 | cut -d' ' -f1)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/arcavenae/homebrew-tap.git" homebrew-tap-repo
          cd homebrew-tap-repo

          mkdir -p Formula
          cp ../Formula/aclaude.rb Formula/aclaude.rb

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" Formula/aclaude.rb
          sed -i "s/TAG_PLACEHOLDER/$TAG/g" Formula/aclaude.rb
          sed -i "s/SHA256_ARM64_PLACEHOLDER/$SHA256_ARM64/g" Formula/aclaude.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aclaude.rb
          git diff --cached --quiet || git commit -m "Update aclaude to v${VERSION}"
          git push

name: Bug Report
description: Report a bug in forestage
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Run `...`
        2. Do '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Run `forestage --version` or paste the commit hash if building from source."
      placeholder: "0.1.0-alpha.20260411.abc1234"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (aarch64)
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages or logs.
      render: shell
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Paste any config that might be relevant (remove sensitive data).
      render: yaml
